<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>中国省份球状云图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: "Ma Shan Zheng", "楷体", "KaiTi", serif;
            background-color: #0f0f0f;
            color: #e8e8e8;
        }

        /* 提示信息 */
        .info-tip {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #D4AF37;
            border-left: 3px solid #D4AF37;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 1px;
        }
        
        .controls-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            color: #8B7355;
            pointer-events: none;
            z-index: 100;
        }

        @media (max-width: 600px) {
            .info-tip { font-size: 10px; bottom: 10px; left: 10px; }
            .controls-hint { font-size: 8px; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <!-- 提示 -->
    <div class="info-tip">点击省份查看建筑详情</div>
    <div class="controls-hint">拖拽旋转 · 滚轮缩放</div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // 场景初始化 - 深灰黑背景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f0f);
        scene.fog = new THREE.FogExp2(0x0f0f0f, 0.003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x0f0f0f, 1);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // 让鼠标事件穿透到3D场景
        document.body.appendChild(labelRenderer.domElement);

        // 星空背景
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const radius = 80 + Math.random() * 40;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = radius * Math.cos(phi);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0x8B7355, size: 0.2, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // 装饰粒子环
        const ringParticleCount = 800;
        const ringGeometry = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringParticleCount * 3);
        for (let i = 0; i < ringParticleCount; i++) {
            const angle = (i / ringParticleCount) * Math.PI * 2;
            const radius = 4.2;
            const y = Math.sin(angle * 3) * 0.8;
            ringPositions[i*3] = Math.cos(angle) * radius;
            ringPositions[i*3+1] = y;
            ringPositions[i*3+2] = Math.sin(angle) * radius;
        }
        ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringMaterial = new THREE.PointsMaterial({ color: 0xD4AF37, size: 0.05, transparent: true, opacity: 0.5 });
        const ringPoints = new THREE.Points(ringGeometry, ringMaterial);
        scene.add(ringPoints);
        
        // 球体线框
        const sphereWireframeGeo = new THREE.SphereGeometry(2.95, 48, 24);
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0xD4AF37, wireframe: true, transparent: true, opacity: 0.25 });
        const wireframeSphere = new THREE.Mesh(sphereWireframeGeo, wireframeMat);
        scene.add(wireframeSphere);
        
        // 内层光晕
        const glowGeo = new THREE.SphereGeometry(3.02, 64, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0xD4AF37, transparent: true, opacity: 0.06, side: THREE.BackSide });
        const glowSphere = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glowSphere);
        
        // 外层粒子云
        const outerParticleCount = 1200;
        const outerParticleGeo = new THREE.BufferGeometry();
        const outerPositions = new Float32Array(outerParticleCount * 3);
        for (let i = 0; i < outerParticleCount; i++) {
            const rad = 3.15 + Math.random() * 0.2;
            const theta2 = Math.random() * Math.PI * 2;
            const phi2 = Math.acos(2 * Math.random() - 1);
            outerPositions[i*3] = rad * Math.sin(phi2) * Math.cos(theta2);
            outerPositions[i*3+1] = rad * Math.sin(phi2) * Math.sin(theta2);
            outerPositions[i*3+2] = rad * Math.cos(phi2);
        }
        outerParticleGeo.setAttribute('position', new THREE.BufferAttribute(outerPositions, 3));
        const outerParticleMat = new THREE.PointsMaterial({ color: 0x8B7355, size: 0.03, transparent: true, opacity: 0.4 });
        const outerParticles = new THREE.Points(outerParticleGeo, outerParticleMat);
        scene.add(outerParticles);
        
        // ===== 中国省级行政单位列表（已简化，与项目数据一致） =====
        const provinces = [
            "北京", "天津", "上海", "重庆",
            "河北", "山西", "辽宁", "吉林", "黑龙江",
            "江苏", "浙江", "安徽", "福建", "江西", "山东",
            "河南", "湖北", "湖南", "广东", "海南",
            "四川", "贵州", "云南", "陕西", "甘肃", "青海",
            "台湾",
            "内蒙古", "广西", "西藏", "宁夏", "新疆"
        ];
        
        // 生成球面上均匀分布的点
        function fibonacciSpherePoints(n, radius) {
            const points = [];
            const phiGoldenRatio = Math.PI * (3 - Math.sqrt(5));
            for (let i = 0; i < n; i++) {
                const y = 1 - (i / (n - 1)) * 2;
                const radiusAtY = Math.sqrt(1 - y*y);
                const theta = i * phiGoldenRatio * 2;
                const x = Math.cos(theta) * radiusAtY;
                const z = Math.sin(theta) * radiusAtY;
                const norm = Math.sqrt(x*x + y*y + z*z);
                const px = (x / norm) * radius;
                const py = (y / norm) * radius;
                const pz = (z / norm) * radius;
                points.push(new THREE.Vector3(px, py, pz));
            }
            return points;
        }
        
        const sphereRadius = 3.05;
        const positions = fibonacciSpherePoints(provinces.length, sphereRadius);
        
        // 为每个省份生成标签
        positions.forEach((pos, idx) => {
            const provinceName = provinces[idx];
            
            const div = document.createElement('div');
            div.textContent = provinceName;
            div.style.fontFamily = "'Ma Shan Zheng', '楷体', 'KaiTi', serif";
            div.style.fontSize = "16px";
            div.style.fontWeight = "500";
            div.style.color = "#e8e8e8";
            div.style.textShadow = "0 0 4px rgba(0,0,0,0.8)";
            div.style.backgroundColor = "#161616";
            div.style.backdropFilter = "blur(4px)";
            div.style.border = "1px solid #D4AF37";
            div.style.borderRadius = "40px";
            div.style.padding = "6px 14px";
            div.style.whiteSpace = "nowrap";
            div.style.cursor = "pointer";
            div.style.transition = "all 0.2s ease-out";
            div.style.boxShadow = "0 2px 8px rgba(0,0,0,0.4)";
            div.style.letterSpacing = "1px";
            div.style.pointerEvents = "auto"; // 确保可点击
            
            // 悬浮效果
            div.addEventListener('mouseenter', () => {
                div.style.backgroundColor = "rgba(212, 175, 55, 0.2)";
                div.style.color = "#D4AF37";
                div.style.border = "1.5px solid #D4AF37";
                div.style.transform = "scale(1.08)";
                div.style.boxShadow = "0 0 15px rgba(212,175,55,0.6)";
            });
            
            div.addEventListener('mouseleave', () => {
                div.style.backgroundColor = "#161616";
                div.style.color = "#e8e8e8";
                div.style.border = "1px solid #D4AF37";
                div.style.transform = "scale(1)";
                div.style.boxShadow = "0 2px 8px rgba(0,0,0,0.4)";
            });
            
            // ===== 关键修改：点击跳转到省份大厅 =====
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                // 从 main/China/html/index.html 跳转到 son/html/profile.html
                // 路径：../../../son/html/profile.html?province=省份名
                const targetUrl = `../../../son/html/profile.html?province=${encodeURIComponent(provinceName)}`;
                console.log(`跳转到: ${targetUrl}`);
                window.parent.location.href = targetUrl; // 父页面跳转，不是iframe内跳转
            });
            
            div.setAttribute('title', `点击查看 ${provinceName} 的建筑详情`);
            
            const label = new CSS2DObject(div);
            label.position.copy(pos);
            scene.add(label);
        });
        
        // 光点
        const dotGeometry = new THREE.BufferGeometry();
        const dotPositions = new Float32Array(provinces.length * 3);
        positions.forEach((pos, i) => {
            dotPositions[i*3] = pos.x;
            dotPositions[i*3+1] = pos.y;
            dotPositions[i*3+2] = pos.z;
        });
        dotGeometry.setAttribute('position', new THREE.BufferAttribute(dotPositions, 3));
        const dotMaterial = new THREE.PointsMaterial({ color: 0xD4AF37, size: 0.08, transparent: true, opacity: 0.9 });
        const dots = new THREE.Points(dotGeometry, dotMaterial);
        scene.add(dots);
        
        // 光晕粒子
        const auraCount = 600;
        const auraGeo = new THREE.BufferGeometry();
        const auraPositions = new Float32Array(auraCount * 3);
        for (let i = 0; i < auraCount; i++) {
            const rad = 3.2 + Math.random() * 0.3;
            const theta2 = Math.random() * Math.PI * 2;
            const phi2 = Math.acos(2 * Math.random() - 1);
            auraPositions[i*3] = rad * Math.sin(phi2) * Math.cos(theta2);
            auraPositions[i*3+1] = rad * Math.sin(phi2) * Math.sin(theta2);
            auraPositions[i*3+2] = rad * Math.cos(phi2);
        }
        auraGeo.setAttribute('position', new THREE.BufferAttribute(auraPositions, 3));
        const auraMat = new THREE.PointsMaterial({ color: 0x8B7355, size: 0.04, transparent: true, opacity: 0.35 });
        const auraParticles = new THREE.Points(auraGeo, auraMat);
        scene.add(auraParticles);
        
        // 灯光
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xD4AF37, 0.4);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0x8B7355, 0.3);
        backLight.position.set(-2, -1, -3);
        scene.add(backLight);
        
        // 装饰环
        const equatorRingGeo = new THREE.TorusGeometry(3.08, 0.02, 64, 400);
        const ringMatGlow = new THREE.MeshStandardMaterial({ color: 0xD4AF37, emissive: 0x553300, emissiveIntensity: 0.2 });
        const equatorRing = new THREE.Mesh(equatorRingGeo, ringMatGlow);
        equatorRing.rotation.x = Math.PI / 2;
        scene.add(equatorRing);
        
        const tiltRingGeo = new THREE.TorusGeometry(3.12, 0.015, 48, 300);
        const tiltRingMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, emissive: 0x331c00 });
        const tiltRing = new THREE.Mesh(tiltRingGeo, tiltRingMat);
        tiltRing.rotation.z = Math.PI / 3;
        tiltRing.rotation.x = Math.PI / 4;
        scene.add(tiltRing);
        
        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 0, 0);
        
        // 动画
        function animateStars() {
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            ringPoints.rotation.y += 0.002;
            ringPoints.rotation.x += 0.001;
            outerParticles.rotation.y -= 0.0008;
            auraParticles.rotation.y += 0.0006;
            dots.rotation.y -= 0.0004;
            equatorRing.rotation.z += 0.002;
            tiltRing.rotation.x += 0.0015;
            tiltRing.rotation.y += 0.001;
        }
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            time += 0.01;
            outerParticleMat.opacity = 0.35 + Math.sin(time * 0.5) * 0.1;
            auraMat.opacity = 0.3 + Math.sin(time * 0.8) * 0.1;
            animateStars();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // 响应式
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log(`✅ 云图加载完成，${provinces.length} 个省份，点击可跳转详情页`);
    </script>
</body>
</html>
