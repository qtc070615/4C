<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script type="module" src="https://unpkg.com/@hotwired/turbo@8.0.4/dist/turbo.es2017-esm.js"></script>
    <script src="../json/type-data.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>建筑详情</title>
    <link rel="stylesheet" href="../css/building.css">
</head>
<body>

    <button class="mobile-toggle" id="mobileToggle">▶</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar" data-turbo-permanent>
        <div class="sidebar-header">
            <div class="menu-search-box">
                <input type="text" id="menuSearch" placeholder="搜索省份或建筑..." autocomplete="off">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>
        </div>
        <div class="menu-accordion" id="menuAccordion"></div>
    </aside>

    <div class="immersive-mode" id="immersiveMode">
        <div class="immersive-image-container">
            <img id="immersiveImage" src="" alt="">
        </div>
        <div class="immersive-overlay"></div>
        
        <div class="immersive-top-bar">
            <a href="./profile.html" class="back-btn" id="backToHall">← 返回大厅</a>
            <div class="meta-info"><span id="immersivePeriod">年代</span></div>
        </div>
        
        <div class="immersive-title">
            <h1 id="immersiveBuildingName">建筑名</h1>
            <p id="immersiveBuildingEnName">Building Name</p>
        </div>
        
        <!-- 修改：改为金色圆角提示框样式，文字更新 -->
        <div class="scroll-hint" id="scrollHint">
            <div class="scroll-arrow">↓</div>
            <div class="scroll-text">点击任意位置返回</div>
        </div>
    </div>

    <main class="main-content" id="mainContent">
        <div class="particle-layer" id="particleLayer"></div>

        <div class="top-bar">
            <a href="../../main/China/html/main.html" class="back-btn">← 返回全国地图</a>
            <div class="meta-info"><span id="buildingPeriod">年代</span></div>
        </div>

        <div class="hero-image-container" id="heroContainer">
            <img id="heroImage" src="" alt="">
            <div class="hero-overlay"></div>
            <div class="hero-title">
                <h1 id="buildingName">建筑名</h1>
                <p id="buildingEnName">Building Name</p>
                <div class="building-meta" id="buildingTags">
                    <span class="tag" id="tagLevel">级别</span>
                    <span class="meta-divider">|</span>
                    <span class="tag" id="tagPeriod">年代</span>
                </div>
            </div>
        </div>

        <div class="content-area" id="contentArea">
            <div class="breadcrumb" id="breadcrumb">
                <a href="../../main/China/html/main.html">全国</a>
                <span>></span>
                <a href="./profile.html" id="crumbMiddle">省份</a>
                <span>></span>
                <span id="crumbBuildingName">建筑名</span>
            </div>
            
            <div class="box glass-box" style="margin-bottom: 25px;">
                <div class="box-header">
                    <div class="box-title">建筑概况</div>
                </div>
                <div class="box-body">
                    <div class="building-desc" id="buildingDesc">加载中...</div>
                    <a href="#" class="baidu-link" id="baiduLink" target="_blank">
                        <span>查看百科</span>
                        <span class="link-arrow">→</span>
                    </a>
                </div>
            </div>

            <div class="grid-2">
                <div class="box glass-box">
                    <div class="box-header">
                        <div class="box-title">建筑特色</div>
                    </div>
                    <div class="box-body">
                        <ul class="feature-list" id="featureList"></ul>
                    </div>
                </div>

                <div class="box glass-box map-box">
                    <div class="box-header">
                        <div class="box-title">地理位置</div>
                    </div>
                    <div class="box-body map-container">
                        <img id="mapImage" src="" alt="地图位置">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 先加载数据文件，再加载逻辑文件 -->
    <script src="../json/building-data.js"></script>
    <script src="../json/profile-data.js"></script>
    <script src="../js/building.js"></script>
</body>
</html>
